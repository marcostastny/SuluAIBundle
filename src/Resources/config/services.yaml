services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Marcostastny\SuluAIBundle\Service\Assistant\AssistantToolInterface:
            tags: ['sulu_ai.assistant_tool']

    Marcostastny\SuluAIBundle\Service\ContentTextFlattener: ~
    Marcostastny\SuluAIBundle\Service\OpenAiClient: ~
    Marcostastny\SuluAIBundle\Service\OpenAiMetaGenerator: ~
    Marcostastny\SuluAIBundle\Service\PageContentExtractor: ~

    Marcostastny\SuluAIBundle\Admin\AiSettingAdmin:
        arguments:
            $viewBuilderFactory: '@sulu_admin.view_builder_factory'
            $securityChecker: '@sulu_security.security_checker'
            $entityManager: '@doctrine.orm.entity_manager'
        tags:
            - { name: sulu.admin }
            - { name: sulu.context, context: admin }

    Marcostastny\SuluAIBundle\Controller\Admin\AiSettingController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $viewHandler: '@fos_rest.view_handler.default'
            $tokenStorage: '@security.token_storage'
        public: true
        tags:
            - { name: sulu.context, context: admin }

    Marcostastny\SuluAIBundle\Controller\Admin\MetaGenerationController:
        public: true
        tags:
            - { name: sulu.context, context: admin }
            - { name: controller.service_arguments }

    Marcostastny\SuluAIBundle\Service\Assistant\TemplateSchemaSerializer: ~
    Marcostastny\SuluAIBundle\Service\Assistant\EditOpValidator: ~

    Marcostastny\SuluAIBundle\Service\Assistant\NavigationTargetCollector: ~

    Marcostastny\SuluAIBundle\Service\Assistant\NavigationTargetResolver:
        arguments:
            $adminResources: '%sulu_search.admin_resources%'

    Marcostastny\SuluAIBundle\Service\Assistant\AdminIndexSearcher:
        arguments:
            $engine: '@cmsig_seal.engine.default'
            $tokenStorage: '@security.token_storage'
            $maskConverter: '@sulu_security.mask_converter'

    Marcostastny\SuluAIBundle\Service\Assistant\FormTitleSearcher:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $securityChecker: '@sulu_security.security_checker'

    Marcostastny\SuluAIBundle\Service\Assistant\Tool\SearchContentTool:
        arguments:
            $adminResources: '%sulu_search.admin_resources%'

    Marcostastny\SuluAIBundle\Service\Assistant\DataQuery\DataQueryGate:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $securityChecker: '@sulu_security.security_checker'

    Marcostastny\SuluAIBundle\Service\Assistant\DataQuery\SelectQueryValidator: ~
    Marcostastny\SuluAIBundle\Service\Assistant\DataQuery\QueryResultCollector: ~

    Marcostastny\SuluAIBundle\Service\Assistant\DataQuery\DataQueryRunner:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    Marcostastny\SuluAIBundle\Service\Assistant\Tool\ListDataTablesTool:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    Marcostastny\SuluAIBundle\Service\Assistant\Tool\RunSelectQueryTool: ~

    Marcostastny\SuluAIBundle\Service\Assistant\Creation\PageCreationGate:
        arguments:
            $securityChecker: '@sulu_security.security_checker'
            $webspaceManager: '@sulu_core.webspace.webspace_manager'

    Marcostastny\SuluAIBundle\Service\Assistant\ToolRegistry:
        arguments:
            $tools: !tagged_iterator sulu_ai.assistant_tool

    Marcostastny\SuluAIBundle\Service\Assistant\AssistantAgent: ~

    Marcostastny\SuluAIBundle\Service\Assistant\AssistantContextBuilder:
        arguments:
            $formMetadataProvider: '@sulu_admin.form_metadata_provider'
            $seoForms: '%sulu_content.content_seo_forms%'

    Marcostastny\SuluAIBundle\Controller\Admin\AssistantController:
        public: true
        tags:
            - { name: sulu.context, context: admin }
            - { name: controller.service_arguments }

    Marcostastny\SuluAIBundle\Controller\Admin\DataQueryExportController:
        arguments:
            $securityChecker: '@sulu_security.security_checker'
        public: true
        tags:
            - { name: sulu.context, context: admin }
            - { name: controller.service_arguments }

    Marcostastny\SuluAIBundle\Service\ImageGeneration\ImagePromptBuilder: ~
    Marcostastny\SuluAIBundle\Service\ImageGeneration\OpenAiImageGenerator: ~

    Marcostastny\SuluAIBundle\Service\ImageGeneration\AiCreatedCollection:
        arguments:
            $collectionManager: '@sulu_media.collection_manager'

    Marcostastny\SuluAIBundle\Service\ImageGeneration\GeneratedImageSaver: ~

    Marcostastny\SuluAIBundle\Controller\Admin\ImageGenerationController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $securityChecker: '@sulu_security.security_checker'
            $tokenStorage: '@security.token_storage'
        public: true
        tags:
            - { name: sulu.context, context: admin }
            - { name: controller.service_arguments }
